<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stint — Terminal-Native Time Tracker</title>
  <meta name="description" content="Stint is an open-source, local-first time tracker built in Rust. Automatic time tracking via shell hooks — no timers to start, no buttons to click.">
  <style>
    :root {
      --bg: #0d1117;
      --panel: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #7ee787;
      --link: #58a6ff;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: ui-monospace, "SF Mono", "Cascadia Code", "Fira Code", Menlo, Consolas, monospace;
      line-height: 1.6;
      padding: 2rem 1rem 4rem;
    }
    main { max-width: 760px; margin: 0 auto; }
    h1 { font-size: 2rem; margin-bottom: 0.75rem; }
    h1::after {
      content: "";
      display: inline-block;
      width: 0.6em;
      height: 1.1em;
      margin-left: 0.15em;
      background: var(--accent);
      vertical-align: text-bottom;
      animation: blink 1.1s steps(1) infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }
    blockquote {
      color: var(--muted);
      border-left: 3px solid var(--accent);
      padding-left: 1rem;
      margin-bottom: 1rem;
    }
    h2 { font-size: 1.2rem; color: var(--accent); margin: 2.25rem 0 0.75rem; }
    h2::before { content: "## "; color: var(--muted); }
    h3 { font-size: 1.05rem; margin: 1.5rem 0 0.5rem; }
    h3::before { content: "### "; color: var(--muted); }
    h4 { font-size: 0.95rem; margin: 1.25rem 0 0.5rem; }
    p { margin-bottom: 0.75rem; }
    a { color: var(--link); text-decoration: none; }
    a:hover { text-decoration: underline; }
    img { vertical-align: middle; }
    pre {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.85rem 1rem;
      overflow-x: auto;
      margin-bottom: 1rem;
      font-size: 0.9rem;
    }
    code { background: var(--panel); padding: 0.1em 0.35em; border-radius: 4px; font-size: 0.9em; }
    pre code { background: none; padding: 0; font-size: inherit; }
    ul, ol { padding-left: 1.4rem; margin-bottom: 0.75rem; }
    li { margin-bottom: 0.35rem; }
    ul { list-style: none; padding-left: 0.2rem; }
    ul li::before { content: "▸ "; color: var(--accent); }
    table {
      border-collapse: collapse;
      margin-bottom: 1rem;
      width: 100%;
      font-size: 0.9rem;
    }
    th, td { border: 1px solid var(--border); padding: 0.4rem 0.75rem; text-align: left; }
    th { background: var(--panel); color: var(--accent); }
    details {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.5rem 1rem;
      margin-bottom: 1rem;
    }
    details[open] { padding-bottom: 1rem; }
    summary { cursor: pointer; }
    summary h2 { display: inline-block; margin: 0.5rem 0; }
    hr { border: none; border-top: 1px solid var(--border); margin: 2rem 0 1.25rem; }
  </style>
</head>
<body>
  <main>
{{CONTENT}}
  </main>
</body>
</html>
