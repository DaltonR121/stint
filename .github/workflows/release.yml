name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  pages: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: stint
            deb: true
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: stint
            deb: false
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: stint
            deb: false
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: stint
            deb: false
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: stint.exe
            deb: false

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../stint-${{ matrix.target }}.tar.gz ${{ matrix.artifact }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          Compress-Archive -Path ${{ matrix.artifact }} -DestinationPath ../../../stint-${{ matrix.target }}.zip

      - name: Build .deb package
        if: matrix.deb
        run: |
          cargo install cargo-deb --locked
          cargo deb -p stint-cli --target ${{ matrix.target }} --no-build
          cp target/${{ matrix.target }}/debian/*.deb stint-${{ matrix.target }}.deb

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: stint-${{ matrix.target }}
          path: stint-${{ matrix.target }}.*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*

  publish-apt:
    name: Publish to apt repository
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Check out gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 0

      - name: Download .deb artifact
        uses: actions/download-artifact@v4
        with:
          name: stint-x86_64-unknown-linux-gnu
          path: incoming/

      - name: Import GPG key
        run: echo "$APT_GPG_PRIVATE_KEY" | gpg --batch --import
        env:
          APT_GPG_PRIVATE_KEY: ${{ secrets.APT_GPG_PRIVATE_KEY }}

      - name: Update apt repository
        run: |
          mkdir -p pool/main/s/stint
          cp incoming/*.deb pool/main/s/stint/

          mkdir -p dists/stable/main/binary-amd64
          dpkg-scanpackages pool/main /dev/null > dists/stable/main/binary-amd64/Packages
          gzip -kf dists/stable/main/binary-amd64/Packages

          cd dists/stable
          apt-ftparchive release . > Release
          gpg --batch --yes --armor --detach-sign -o Release.gpg Release
          gpg --batch --yes --clearsign -o InRelease Release

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -A
          git commit -m "Update apt repo for ${{ github.ref_name }}" || true
          git push
